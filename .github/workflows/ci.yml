name: phase-10-ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('phase-10-pr-{0}', github.event.pull_request.number) || format('phase-10-run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FABLE5_VERIFY_PHASE: "10"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - run: npm ci
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run contracts:check
      - run: npm run build
      - run: python scripts/verify_phase1.py --static-only --phase 10
      - run: docker compose config --quiet

  unit:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - run: npm ci
      - name: Hydrate frozen Linux Rolldown binding
        run: |
          npm install --no-save --ignore-scripts --no-audit --no-fund @rolldown/binding-linux-x64-gnu@1.1.5
          git diff --exit-code -- package.json package-lock.json packages/contracts/package.json services/frontend/package.json
      - run: python -m pytest
      - run: npm test

  phase10-compose:
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - run: npm ci
      - name: Pre-pull immutable browser runtime
        run: docker pull mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      - name: Run Phase 10 Compose acceptance
        run: python scripts/verify_phase1.py --phase 10

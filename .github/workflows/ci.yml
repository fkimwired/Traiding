name: phase-6-ci

on:
  push:
  pull_request:

env:
  FABLE5_VERIFY_PHASE: "6"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - run: npm ci
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run contracts:check
      - run: python -m pytest
      - run: npm test
      - run: npm run build
      - run: python scripts/verify_phase1.py --static-only --phase 6
      - run: docker compose config --quiet

  compose-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - run: python scripts/verify_phase1.py --phase 6
